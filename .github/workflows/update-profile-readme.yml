name: Update organization profile README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Generate README
        env:
          README_DATA_ENDPOINT: ${{ secrets.README_DATA_ENDPOINT }}
          README_DATA_TOKEN: ${{ secrets.README_DATA_TOKEN }}
        run: python3 scripts/update_readme.py

      - name: Commit README changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet profile/README.md; then
            echo "No README changes to commit."
          else
            git add profile/README.md
            git commit -m "Update organization profile README stats"
            git push
          fi
